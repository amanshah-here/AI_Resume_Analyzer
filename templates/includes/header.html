{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ResumeAI</title>

    <!-- BOOTSTRAP -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- BOOTSTRAP ICONS -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- FONT AWESOME -->

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- GOOGLE FONT -->

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS FILES -->

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
    <link rel="stylesheet" href="{% static 'css/uploads.css' %}" />
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <link rel="stylesheet" href="{% static 'css/contacts.css' %}" />
    <link rel="stylesheet" href="{% static 'css/donate.css' %}" />

    <!-- PARTICLES -->

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <!-- SWEET ALERT -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <!-- PARTICLE BACKGROUND -->

    <div id="particles-js"></div>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
      <div class="container">
        <!-- LOGO -->

        <a class="navbar-brand logo-brand" href="{% url 'home' %}">
          <i class="fa-solid fa-brain"></i>

          <span>ResumeAI</span>
        </a>

        <!-- MOBILE TOGGLER -->

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- NAV CONTENT -->

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <!-- CENTER NAV -->

          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#" id="uploadNavBtn"> Upload </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'portfolio' %}"> Portfolio </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'contact' %}"> Contact us! </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'donate' %}"> Donate us! </a>
            </li>
          </ul>

          <!-- RIGHT SIDE -->

          <div class="d-flex align-items-center nav-auth">
            {% if user.is_authenticated %}

            <a href="{% url 'logout' %}" class="logout-btn">
              Logout

              <i class="fa-solid fa-right-from-bracket"></i>
            </a>

            {% else %}

            <a href="{% url 'login' %}" class="login-btn"> Login </a>

            <a href="{% url 'register' %}" class="register-btn"> Register </a>

            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <!-- SWEET ALERT DJANGO MESSAGES -->

    {% if messages %} {% for message in messages %}

    <script>
      Swal.fire({
        title: "{{ message }}",

        icon: "{{ message.tags }}",

        background: "#020617",

        color: "#ffffff",

        confirmButtonColor: "#1ea7ff",
      });
    </script>

    {% endfor %} {% endif %}

    <!-- LOGIN CHECK FOR UPLOAD -->

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const uploadBtn = document.getElementById("uploadNavBtn");

        uploadBtn.addEventListener("click", function (e) {
          e.preventDefault();

          const isAuthenticated =
            "{{ user.is_authenticated|yesno:'true,false' }}";

          if (isAuthenticated === "true") {
            window.location.href = "{% url 'upload' %}";
          } else {
            Swal.fire({
              title: "Login Required",

              text: "Please login first to upload your resume.",

              icon: "warning",

              background: "#071739",

              color: "#ffffff",

              confirmButtonColor: "#1ea7ff",

              confirmButtonText: "Login Now",

              backdrop: `
                            rgba(0,0,0,0.8)
                        `,
            }).then((result) => {
              if (result.isConfirmed) {
                window.location.href = "{% url 'login' %}";
              }
            });
          }
        });
      });
    </script>

    <!-- PARTICLES CONFIG -->

    <script>
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 70,
            density: {
              enable: true,
              value_area: 1000,
            },
          },

          color: {
            value: "#38bdf8",
          },

          shape: {
            type: "circle",
          },

          opacity: {
            value: 0.45,
            random: true,
          },

          size: {
            value: 3,
            random: true,
          },

          line_linked: {
            enable: true,
            distance: 160,
            color: "#38bdf8",
            opacity: 0.25,
            width: 1,
          },

          move: {
            enable: true,
            speed: 1.5,
            direction: "none",
            random: false,
            straight: false,
            out_mode: "out",
          },
        },

        interactivity: {
          detect_on: "canvas",

          events: {
            onhover: {
              enable: true,
              mode: "grab",
            },

            resize: true,
          },

          modes: {
            grab: {
              distance: 180,

              line_linked: {
                opacity: 0.5,
              },
            },
          },
        },

        retina_detect: true,
      });
    </script>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
